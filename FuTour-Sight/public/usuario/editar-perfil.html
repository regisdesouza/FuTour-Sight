            <nav>
                <ul>

                        <button onclick="redirecionarDashboard()">

                    <li>
                        <button onclick="redirecionarEdicaoEmpresa()">

                        </button>
                    </li>
                    <li>
                        <button onclick="redirecionarPerfil()">
                            <img src="../assets/images/icons/perfil.png" alt="icone de perfil">

                        </button>
                    </li>
                    <li>
                        <button onclick="redirecionarListFuncionario()">
                            <img src="../assets/images/icons/historico.png" alt="icone de historico">
                            <span>Funcionários</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="filtro()">
                            <img src="../assets/images/icons/filtro.png" alt="icone de filtro">

                        </button>
                    </li>
                </ul>
            </nav>

            <button class="botao-sair-container" onclick="sair()">
                <img src="../assets/images/icons/sair.png" alt="icone de sair">
                <span class="botao-sair">Sair</span>
            </button>

            <div class="logo">
                <img src="../assets/images/logo-futour-sight-branco.png" alt="Logo FuTour Sight">
                <span>FuTour Sight</span>
            </div>
        </div>
    </header>

        <!-- ------------------------- PÁGINA ------------------------- -->

        <div class="conteudo">

            <div class="titulo-pagina">
                <h1>Atualizar Dados Pessoais</h1>
            </div>

            <div class="banner-usuario">
                <div class="banner-usuario-mens">
                    <h1>Seja bem-vindo</h1>
                    <h2 id="banner-nome-usuario"></h2>
                    <h3 id="banner-email-usuario"></h1>
                </div>
                <img src="../assets/images/empresa-senha.png" alt="" class="banner-img">

            </div>

            <hr>

            <div class="empresa-container form-box-empresa">
                <form action="">
                    <h1>Dados Pessoais</h1>
                    <div class="input-fb-empresa">
                        <div class="input-container">
                            <div class="label-container">
                                <label for="nome">Nome Completo</label>
                                <img src="../assets/images/icons/pessoa.png" alt="ícone de pessoa">
                            </div>
                            <input type="text" id="nome" placeholder="Nome Completo">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="nome">Email</label>
                                <img src="../assets/images/icons/email.png" alt="ícone de email">
                            </div>
                            <input type="text" id="email" placeholder="E-mail">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="senha-atual">Senha atual</label>
                                <img src="../assets/images/icons/senha.png" alt="ícone de senha">
                            </div>
                            <input type="password" id="senha-atual" placeholder="Senha Atual">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="nova-senha">Nova Senha</label>
                                <img src="../assets/images/icons/senha.png" alt="ícone de senha">
                            </div>
                            <input type="password" id="nova-senha" placeholder="Senha Atual">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="conf-nova-senha">Confirmar Senha atual</label>
                                <img src="../assets/images/icons/senha.png" alt="ícone de senha">
                            </div>
                            <input type="password" id="conf-senha-atual" placeholder="Confirmar Senha Atual">
                        </div>



                    </div>

                </form>

            </div>
            <div class="emp-div-btn">
                <button onclick="editarPerfil()" type="button" class="btn-main register-btn botao-cadastrar">Atualizar</button>
            </div>
