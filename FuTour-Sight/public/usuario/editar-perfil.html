    <header>
        <a href="../index.html" class="logo">

        </a>

        <label for="menu-hamburguer" class="menu-hamburguer">

                <span class="hamburguer"></span>
            </div>
        </label>

        <div class="overlay"></div>

        <div class="links">
            <nav>
                <div class="menu-usuario">
                    <img src="../assets/images/placeholder-foto.png" alt="Foto da Empresa" class="img-circular">
                    <h1>Nome de usuário</h1>
                </div>
            </nav>
            <nav>
                <a href="./dashboard-proprietario.html" class="input-box">
                    <i class="bi bi-graph-up-arrow"></i>
                    <span>Dashboard</span>
                </a>

                <a href="./edicao-empresa.html" class="input-box">
                    <i class="bi bi-building"></i>
                    <span>Empresa</span>
                </a>

                <a href="./editar-perfil.html" class="input-box">
                    <i class="bi bi-person-fill"></i>
                    <span>Perfil</span>
                </a>

                <a href="" class="input-box">
                    <i class="bi bi-clock-history"></i>
                    <span>Histórico</span>
                </a>

                <a href="./filtros.html" class="input-box">
                    <i class="bi bi-funnel-fill"></i>
                    <span>Filtro</span>
                </a>
            </nav>
            <nav>
                <div class="menu-lista">
                    <a href="" class="input-box">
                        <i class="bi bi-box-arrow-left"></i>
                        <span>Sair</span>
                    </a>
                </div>
            </nav>
            <a href="../index.html" target="_blank" class="menu-logo">
                <img src="../assets/images/logo-futour-sight-branco.png" alt="">
                <h3>FuTour Sight</h3>
            </a>
        </div>
    </header>

    <main>

        <!-- ------------------------- SIDEBAR ------------------------- -->

        <div class="menu-lateral">

            <div class="menu-usuario">
                <img src="../assets/images/placeholder-foto.png" alt="Foto da Empresa" class="img-circular">
                <h1>Nome de usuário</h1>
            </div>

            <div class="menu-lista links">
                <a href="./dashboard-proprietario.html" class="input-box">
                    <i class="bi bi-graph-up-arrow"></i>
                    <span>Dashboard</span>
                </a>

                <a href="./edicao-empresa.html" class="input-box">
                    <i class="bi bi-building"></i>

                </a>

                <a href="./editar-perfil.html" class="input-box">
                    <i class="bi bi-person-fill"></i>
                    <span>Perfil</span>
                </a>

                <a href="" class="input-box">
                    <i class="bi bi-clock-history"></i>
                    <span>Histórico</span>
                </a>

                <a href="./filtros.html" class="input-box">
                    <i class="bi bi-funnel-fill"></i>
                    <span>Filtro</span>

            <div class="menu-lista">
                <a href="" class="input-box">
                    <i class="bi bi-box-arrow-left"></i>

            <a href="../index.html" target="_blank" class="menu-logo">
                <img src="../assets/images/logo-futour-sight-branco.png" alt="">
                <h3>FuTour Sight</h3>
            </a>

        </div>

        <!-- ------------------------- PÁGINA ------------------------- -->

        <div class="conteudo">

            <div class="titulo-pagina">
                <h1>Atualizar Dados Pessoais</h1>
            </div>

            <div class="banner-usuario">
                <div class="banner-usuario-mens">
                    <h1>Seja bem-vindo</h1>
                    <h2>Nome da Empresa</h2>
                    <h3>email@email.com</h1>
                </div>
                <img src="../assets/images/empresa-senha.png" alt="" class="banner-img">

            </div>

            <hr>

            <div class="empresa-container form-box-empresa">
                <form action="">
                    <h1>Dados Pessoais</h1>
                    <div class="input-fb-empresa">
                        <div class="input-container">
                            <div class="label-container">
                                <label for="nome">Nome Completo</label>
                                <img src="../assets/images/icons/pessoa.png" alt="ícone de pessoa">
                            </div>
                            <input type="text" id="nome" placeholder="Nome Completo">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="nome">Email</label>
                                <img src="../assets/images/icons/email.png" alt="ícone de email">
                            </div>
                            <input type="text" id="email" placeholder="E-mail">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="senha-atual">Senha atual</label>
                                <img src="../assets/images/icons/senha.png" alt="ícone de senha">
                            </div>
                            <input type="password" id="senha-atual" placeholder="Senha Atual">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="nova-senha">Nova Senha</label>
                                <img src="../assets/images/icons/senha.png" alt="ícone de senha">
                            </div>
                            <input type="password" id="nova-senha" placeholder="Senha Atual">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="conf-nova-senha">Confirmar Senha atual</label>
                                <img src="../assets/images/icons/senha.png" alt="ícone de senha">
                            </div>
                            <input type="password" id="conf-senha-atual" placeholder="Confirmar Senha Atual">
                        </div>



                    </div>

                </form>

            </div>
            <div class="emp-div-btn">
                <button type="button" class="btn-main register-btn botao-cadastrar">Atualizar</button>
            </div>

        </div>


    </main>
