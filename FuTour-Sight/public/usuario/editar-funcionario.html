<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuTourSight | Editar funcionário</title>

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/usuario.css">
    <link rel="stylesheet" href="../assets/css/filtros.css">

    <link rel="shortcut icon" href="../assets/images/icons/favicon.png" type="image/x-icon">
</head>

<body class="background-branco">
    <header>
        <input type="checkbox" id="menu-hamburguer">
        <label for="menu-hamburguer" class="menu-hamburguer">
            <div class="menu">
                <span class="hamburguer"></span>
            </div>
        </label>
        <div class="overlay"></div>
        <div class="links">
            <div class="usuario-infos">
                <div class="img-container">
                    <img src="https://placehold.co/200x200/png" alt="Imagem da empresa">
                </div>
                <span>Nome do usuário</span>
            </div>
            <nav>
                <ul>
                    <li><img src="../assets/images/icons/dashboard.png" alt=""><button>Dashboard</button></li>
                    <li><img src="../assets/images/icons/empresa-branca.png" alt=""><button>Empresa</button></li>
                    <li><img src="../assets/images/icons/perfil.png" alt=""><button>Perfil</button></li>
                    <li><img src="../assets/images/icons/historico.png" alt=""><button>Funcionários</button></li>
                    <li><img src="../assets/images/icons/filtro.png" alt=""><button>Filtro</button></li>
                </ul>
            </nav>
            <div class="botao-sair-container">
                <img src="../assets/images/icons/sair.png" alt="">
                <button class="botao-sair">Sair</button>
            </div>
            <div class="logo">
                <img src="../assets/images/logo-futour-sight-branco.png" alt="Logo FuTour Sight">
                <span>FuTour Sight</span>
            </div>
        </div>
    </header>

    <main>
        <section class="novo-filtro">
            <div class="titulo">
                <h2>Editar funcionário</h2>
                <p>Edite e salve seu funcionário</p>
            </div>

            <div class="criar-filtro-container">
                <div class="criar-filtro">

                    <div class="campo">
                        <label for="nome-funcionario">Nome do funcionário</label>
                        <input id="nome-funcionario" type="text" placeholder="Nome do funcionário">
                    </div>

                    <div class="campo">
                        <label for="nivel-permissao">Nível de permissão</label>
                        <select id="nivel-permissao">
                            <option value="">Selecione</option>
                            <option value="2">EMPRESA_ADMIN</option>
                            <option value="3">EMPRESA_USER</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="email">Email</label>
                        <input id="email" type="text" placeholder="Email">
                    </div>

                </div>

                <div class="botoes">
                    <button onclick="cancelar()">Cancelar</button>
                    <button onclick="salvarEdicao()">Atualizar funcionário</button>
                </div>
            </div>
        </section>
    </main>

    <script src="../assets/js/shared/sessao.js"></script>
    <script src="../assets/js/pages/usuario/editarFuncionario.js"></script>

</body>

</html>
