<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuTour Sight | Filtros</title>

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/usuario.css">
    <link rel="stylesheet" href="../assets/css/filtros.css">

    <link rel="shortcut icon" href="../assets/images/icons/favicon.png" type="image/x-icon">
</head>

<body class="background-branco">
    <header>
        <input type="checkbox" id="menu-hamburguer">

        <label for="menu-hamburguer" class="menu-hamburguer">
            <div class="menu">
                <span class="hamburguer"></span>
            </div>
        </label>

        <div class="overlay"></div>

        <div class="links">
            <div class="usuario-infos">
                <div class="img-container">
                    <img src="../assets/images/icons/logo-FuTourSight-branco.png" alt="Imagem da empresa">
                </div>
                <span>Nome do usuário</span>
            </div>

            <nav>
                <ul>
                    <li>
                        <button>
                            <img src="../assets/images/icons/dashboard.png" alt="icone de dashboard">
                            <span>Dashboard</span>
                        </button>
                    </li>
                    <li>
                        <button>
                            <img src="../assets/images/icons/empresa-branca.png" alt="icone de empresa da cor branca">
                            <span>Empresa</span>
                        </button>
                    </li>
                    <li>
                        <button>
                            <img src="../assets/images/icons/perfil.png" alt="icone de perfil">
                            <span>Perfil</span>
                        </button>
                    </li>
                    <li>
                        <button>
                            <img src="../assets/images/icons/historico.png" alt="icone de historico">
                            <span>Funcionários</span>
                        </button>
                    </li>
                    <li>
                        <button>
                            <img src="../assets/images/icons/filtro.png" alt="icone de filtro">
                            <span>Filtro</span>
                        </button>
                    </li>
                </ul>
            </nav>

            <button class="botao-sair-container">
                <img src="../assets/images/icons/sair.png" alt="icone de sair">
                <span class="botao-sair">Sair</span>
            </button>

            <div class="logo">
                <img src="../assets/images/logo-futour-sight-branco.png" alt="Logo FuTour Sight">
                <span>FuTour Sight</span>
            </div>
        </div>
    </header>

    <main>
        <section class="novo-filtro">
            <div class="titulo">
                <h2>Novo filtro</h2>
                <p>Configure e salve uma visão personalizada da Dashboard</p>
            </div>

            <div class="criar-filtro-container">
                <div class="criar-filtro">
                    <div class="campo">
                        <label for="nome-filtro">Nome do filtro</label>
                        <input id="nome-filtro" type="text" placeholder="Nome do filtro">
                    </div>
                    <div class="campo">
                        <label for="estado-destino">Estado de destino</label>
                        <select name="estado-destino" id="estado-destino" onchange="adicionarEstado()">
                            <option value="">Selecione um estado...</option>
                        </select>
                        <ul>
                            
                        </ul>
                    </div>
                    <div class="campo">
                        <label for="pais-origem">País de origem</label>
                        <select name="pais-origem" id="pais-origem" onchange="adicionarPais()">
                            <option value="">Selecione um país...</option>
                        </select>
                        <ul>
                            
                        </ul>
                    </div>

                    <div class="intervalo-meses-container">
                        <label for="">Intervalo de meses</label>
                        <div class="intervalo-meses">
                            <select name="" id="mes-inicio">
                                <option value="Janeiro">Janeiro</option>
                                <option value="Fevereiro">Fevereiro</option>
                                <option value="Março">Março</option>
                                <option value="Abril">Abril</option>
                                <option value="Maio">Maio</option>
                                <option value="Junho">Junho</option>
                                <option value="Julho">Julho</option>
                                <option value="Agosto">Agosto</option>
                                <option value="Setembro">Setembro</option>
                                <option value="Outubro">Outubro</option>
                                <option value="Novembro">Novembro</option>
                                <option value="Dezembro">Dezembro</option>
                            </select>
                            <span>até</span>
                            <select name="" id="mes-final">
                                <option value="Janeiro">Janeiro</option>
                                <option value="Fevereiro">Fevereiro</option>
                                <option value="Março">Março</option>
                                <option value="Abril">Abril</option>
                                <option value="Maio">Maio</option>
                                <option value="Junho">Junho</option>
                                <option value="Julho">Julho</option>
                                <option value="Agosto">Agosto</option>
                                <option value="Setembro">Setembro</option>
                                <option value="Outubro">Outubro</option>
                                <option value="Novembro">Novembro</option>
                                <option value="Dezembro">Dezembro</option>
                            </select>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="ano-referencia">Ano de referência</label>
                        <select name="ano-referencia" id="ano-referencia">
                            <option value="2025">2025</option>
                            <option value="2024">2024 </option>
                        </select>
                    </div>
                </div>

                <div class="botoes">
                    <button>Limpar</button>
                    <button onclick="salvarFiltro()">Salvar filtro</button>
                </div>
            </div>
        </section>

        <section class="filtros-salvos">
            <div class="titulo">
                <h2>Filtros salvos</h2>
                <!-- Pegar do Banco quantidade de filtros -->
                <p id="pQuantidadeFiltros"></p>
            </div>

            <ul id="ul_filtros">
                <!-- <li class="filtro">
                    <div class="infos-filtro-container">
                        <div class="icone-filtro">
                            <span>N</span>
                        </div>

                        <div class="infos-filtro">
                            <h4>Nordeste 2024</h4>
                            <p>BA, PF, CE +6</p>
                        </div>
                    </div>

                    <div class="botoes">
                        <button>Editar</button>
                        <button>Excluir</button>
                    </div>
                </li> -->
            </ul>
        </section>
    </main>
</body>

</html>

<script src="../assets/js/pages/usuario/filtros.js"></script>
