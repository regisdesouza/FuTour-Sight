    <header>

        <label for="menu-hamburguer" class="menu-hamburguer">
            <div class="menu">
                <span class="hamburguer"></span>
            </div>
        </label>

        <div class="overlay"></div>

        <div class="links">
            <div class="usuario-infos">
                <div class="img-container">
                    <img src="../assets/images/icons/logo-FuTourSight-branco.png" alt="Imagem da empresa">
                </div>
                <span id="nomeUser"></span>
            </div>

            <nav>
                <ul>
                    <li>
                        <button onclick="redirecionarDashboard()">
                            <img src="../assets/images/icons/dashboard.png" alt="icone de dashboard">
                            <span>Dashboard</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="redirecionarEdicaoEmpresa()">
                            <img src="../assets/images/icons/empresa-branca.png" alt="icone de empresa da cor branca">
                            <span>Empresa</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="redirecionarPerfil()">
                            <img src="../assets/images/icons/perfil.png" alt="icone de perfil">
                            <span>Perfil</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="redirecionarListFuncionario()">
                            <img src="../assets/images/icons/historico.png" alt="icone de historico">
                            <span>Funcionários</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="filtro()">
                            <img src="../assets/images/icons/filtro.png" alt="icone de filtro">
                            <span>Filtro</span>
                        </button>
                    </li>
                </ul>
            </nav>

            <button class="botao-sair-container" onclick="sair()">
                <img src="../assets/images/icons/sair.png" alt="icone de sair">
                <span class="botao-sair">Sair</span>
            </button>

            <div class="logo">
                <img src="../assets/images/logo-futour-sight-branco.png" alt="Logo FuTour Sight">
                <span>FuTour Sight</span>
            </div>
        </div>
    </header>

        <!-- ------------------------- PÁGINA ------------------------- -->

        <div class="conteudo">

            <div class="titulo-pagina">
                <h1>Atualizar Dados Empresariais</h1>
            </div>

            <div class="banner-usuario">
                <!-- <img src="../assets/images/logo-futour-sight-colorido.png" alt="" class="img-circular"> -->

                <div class="banner-usuario-mens">
                    <h1>Seja bem-vindo</h1>
                    <h2 id="banner-nome-empresa"></h2>
                    <h3 id="banner-email-empresa"></h1>
                </div>
                <img src="../assets/images/edicao-img1.png" alt="" class="banner-img">

            </div>

            <hr>

            <div class="empresa-container form-box-empresa">
                <form action="">
                    <h1>Dados Empresariais</h1>
                    <div class="input-fb-empresa">

                        <div class="input-container">
                            <div class="label-container">
                                <label for="emp-name">Nome da Empresa</label>
                                <img src="../assets/images/icons/empresa.png" alt="ícone de empresa">
                            </div>
                            <input type="text" id="empresa" placeholder="Empresa">
                            <div class="msg_erro" id="div_msg_nome_empresa"></div>

                        </div>
                        

                        <div class="input-container">
                            <div class="label-container">
                                <label for="cpnj">CNPJ</label>
                                <img src="../assets/images/icons/empresa.png" alt="ícone de empresa">
                            </div>
                            <input type="text" id="cnpj" placeholder="CNPJ">
                            <div class="msg_erro" id="div_msg_cnpj"></div>
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="emp-mail">E-mail da Empresa</label>
                                <img src="../assets/images/icons/email.png" alt="ícone de email">
                            </div>
                            <input type="text" id="emailCorporativo" placeholder="E-mail da Empresa">
                            <div class="msg_erro" id="div_msg_email_corporativo"></div>
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="telefone-corporativo">Telefone da Empresa</label>
                                <img src="../assets/images/icons/telefone.png" alt="ícone de telefone">
                            </div>
                            <input type="text" id="telefone" placeholder="Telefone da Empresa">
                            <div class="msg_erro" id="div_msg_telefone"></div>
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="cep">CEP</label>
                                <img src="../assets/images/icons/endereco.png" alt="ícone de localização">
                            </div>
                            <input type="text" id="cep" placeholder="00000-000">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="estado">Estado</label>
                                <img src="../assets/images/icons/endereco.png" alt="ícone de localização">
                            </div>
                            <input type="text" id="estado" placeholder="Estado">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="cidade">Cidade</label>
                                <img src="../assets/images/icons/endereco.png" alt="ícone de localização">
                            </div>
                            <input type="text" id="cidade" placeholder="Cidade">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="bairro">Bairro</label>
                                <img src="../assets/images/icons/endereco.png" alt="ícone de localização">
                            </div>
                            <input type="text" id="bairro" placeholder="Bairro">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="rua">Logradouro</label>
                                <img src="../assets/images/icons/empresa.png" alt="ícone de localização">
                            </div>
                            <input type="text" id="rua" placeholder="Logradouro">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="numero">Número</label>
                                <img src="../assets/images/icons/numero.png" alt="ícone de empresa">
                            </div>
                            <input type="text" id="numero" placeholder="Número">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="complemento">Complemento</label>
                                <img src="../assets/images/icons/info.png" alt="ícone de informação">
                            </div>
                            <input type="text" id="complemento" placeholder="Complemento">
                        </div>



                </form>

            </div>


        </div>

        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>
        <div class="msg_erro" id="div_erros"> </div>

        <div id="div_aguardar" class="loading-div">
            <img src="" id="">
        </div>

        <div class="emp-div-btn">
            <button type="button" class="botao botao-cadastrar" onclick="editarEmpresa()">Atualizar</button>
        </div>


    </main>

    <div id="toast"></div>

    <script src="../assets/js/shared/menu.js"></script>
    <script src="../assets/js/utils/validacoes.js"></script>
    <script src="../assets/js/shared/sessao.js"></script>

    <script src="../assets/js/utils/redirecionamento.js"></script>
    <script src="../assets/js/utils/utils.js"></script>
    <script src="https://unpkg.com/inputmask@5.0.8/dist/inputmask.min.js"></script>
    <script src="../assets/js/pages/usuario/edicaoEmpresa.js"></script>
