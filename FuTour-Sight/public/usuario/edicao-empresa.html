<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuTour Sight | Empresa</title>

    <link rel="icon" href="../assets/images/logo-futour-sight-icone-pagina.png" type="image/png">

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/edicao.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="shortcut icon" href="../assets/images/icons/favicon.png" type="image/x-icon">
</head>

<body class="body-empresa">

    <header>
        <a href="../index.html" class="logo">
            <img src="../assets/images/logo-futour-sight-branco.png" alt="Logo FuTour Sight">
            <span>FuTour Sight</span>
        </a>

        <input type="checkbox" id="menu-hamburguer">

        <label for="menu-hamburguer" class="menu-hamburguer">
            <div class="menu">
                <span class="hamburguer"></span>
            </div>
        </label>

        <div class="overlay"></div>

        <div class="links">
            <nav>
                <div class="menu-usuario">
                    <img src="../assets/images/placeholder-foto.png" alt="Foto da Empresa" class="img-circular">
                    <h1>Nome de usuário</h1>
                </div>
            </nav>
            <nav>
                <a href="./dashboard-proprietario.html" class="input-box">
                    <i class="bi bi-graph-up-arrow"></i>
                    <span>Dashboard</span>
                </a>

                <a href="./edicao-empresa.html" class="input-box">
                    <i class="bi bi-building"></i>
                    <span>Empresa</span>
                </a>

                <a href="./editar-perfil.html" class="input-box">
                    <i class="bi bi-person-fill"></i>
                    <span>Perfil</span>
                </a>

                <a href="" class="input-box">
                    <i class="bi bi-clock-history"></i>
                    <span>Histórico</span>
                </a>

                <a href="./filtros.html" class="input-box">
                    <i class="bi bi-funnel-fill"></i>
                    <span>Filtro</span>
                </a>
            </nav>
            <nav>
                <div class="menu-lista">
                    <a href="" class="input-box">
                        <i class="bi bi-box-arrow-left"></i>
                        <span>Sair</span>
                    </a>
                </div>
            </nav>
            <a href="../index.html" target="_blank" class="menu-logo">
                <img src="../assets/images/logo-futour-sight-branco.png" alt="">
                <h3>FuTour Sight</h3>
            </a>
        </div>
    </header>

    <main>

        <!-- ------------------------- SIDEBAR ------------------------- -->

        <div class="menu-lateral">

            <div class="menu-usuario">
                <img src="../assets/images/placeholder-foto.png" alt="Foto da Empresa" class="img-circular">
                <h1>Nome de usuário</h1>
            </div>

            <div class="menu-lista links">
                <a href="./dashboard-proprietario.html" class="input-box">
                    <i class="bi bi-graph-up-arrow"></i>
                    <span>Dashboard</span>
                </a>

                <a href="./edicao-empresa.html" class="input-box">
                    <i class="bi bi-building"></i>
                    <span>Empresa</span>
                </a>

                <a href="./editar-perfil.html" class="input-box">
                    <i class="bi bi-person-fill"></i>
                    <span>Perfil</span>
                </a>

                <a href="" class="input-box">
                    <i class="bi bi-clock-history"></i>
                    <span>Histórico</span>
                </a>

                <a href="./filtros.html" class="input-box">
                    <i class="bi bi-funnel-fill"></i>
                    <span>Filtro</span>
                </a>
            </div>

            <div class="menu-lista">
                <a href="" class="input-box">
                    <i class="bi bi-box-arrow-left"></i>
                    <span>Sair</span>
                </a>
            </div>

            <a href="../index.html" target="_blank" class="menu-logo">
                <img src="../assets/images/logo-futour-sight-branco.png" alt="">
                <h3>FuTour Sight</h3>
            </a>

        </div>

        <!-- ------------------------- PÁGINA ------------------------- -->

        <div class="conteudo">

            <div class="titulo-pagina">
                <h1>Atualizar Dados Empresariais</h1>
            </div>

            <div class="banner-usuario">
                <img src="../assets/images/placeholder-foto.png" alt="" class="img-circular">

                <div class="banner-usuario-mens">
                    <h1>Seja bem-vindo</h1>
                    <h2>Nome da Empresa</h2>
                    <h3>email@email.com</h1>
                </div>
                <img src="../assets/images/edicao-img1.png" alt="" class="banner-img">

            </div>

            <hr>

            <div class="empresa-container form-box-empresa">
                <form action="">
                    <h1>Dados Empresariais</h1>
                    <div class="input-fb-empresa">

                        <div class="input-container">
                            <div class="label-container">
                                <label for="emp-name">Nome da Empresa</label>
                                <img src="../assets/images/icons/empresa.png" alt="ícone de empresa">
                            </div>
                            <input type="text" id="emp-name" placeholder="Empresa">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="cpnj">CNPJ</label>
                                <img src="../assets/images/icons/empresa.png" alt="ícone de empresa">
                            </div>
                            <input type="text" id="cnpj" placeholder="CNPJ">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="emp-mail">E-mail da Empresa</label>
                                <img src="../assets/images/icons/email.png" alt="ícone de email">
                            </div>
                            <input type="text" id="emp-mail" placeholder="E-mail da Empresa">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="telefone-corporativo">Telefone da Empresa</label>
                                <img src="../assets/images/icons/telefone.png" alt="ícone de telefone">
                            </div>
                            <input type="text" id="emp-tel" placeholder="Telefone da Empresa">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="cep">CEP</label>
                                <img src="../assets/images/icons/endereco.png" alt="ícone de localização">
                            </div>
                            <input type="text" id="cep" placeholder="00000-000">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="estado">Estado</label>
                                <img src="../assets/images/icons/endereco.png" alt="ícone de localização">
                            </div>
                            <input type="text" id="estado" placeholder="Estado">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="cidade">Cidade</label>
                                <img src="../assets/images/icons/endereco.png" alt="ícone de localização">
                            </div>
                            <input type="text" id="cidade" placeholder="Cidade">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="bairro">Bairro</label>
                                <img src="../assets/images/icons/endereco.png" alt="ícone de localização">
                            </div>
                            <input type="text" id="bairro" placeholder="Bairro">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="rua">Logradouro</label>
                                <img src="../assets/images/icons/empresa.png" alt="ícone de localização">
                            </div>
                            <input type="text" id="rua" placeholder="Logradouro">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="numero">Número</label>
                                <img src="../assets/images/icons/numero.png" alt="ícone de empresa">
                            </div>
                            <input type="text" id="numero" placeholder="Número">
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="complemento">Complemento</label>
                                <img src="../assets/images/icons/info.png" alt="ícone de informação">
                            </div>
                            <input type="text" id="complemento" placeholder="Complemento">
                        </div>



                </form>

            </div>


        </div>
        <div class="emp-div-btn">
            <button type="button" class="botao botao-cadastrar">Atualizar</button>
        </div>


    </main>

    <script src="./assets/js/menu.js"></script>
    <script src="./assets/js/validacoes.js"></script>
    <script src="./assets/js/sessao.js"></script>
    <script src="https://unpkg.com/inputmask@5.0.8/dist/inputmask.min.js"></script>
    <script src="../assets/js/pages/usuario/edicaoEmpresa.js"></script>
</body>

</html>
