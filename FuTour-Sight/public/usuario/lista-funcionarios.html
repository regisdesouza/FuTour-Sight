<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuTour Sight | Funcionários</title>

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/usuario.css">
    <link rel="stylesheet" href="../assets/css/lista-funcionarios.css">

    <link rel="shortcut icon" href="../assets/images/icons/favicon.png" type="image/x-icon">
</head>

<body class="background-branco" onload="verificarToast('sucesso', 'Funcionário atualizado com sucesso!')">
    <header>
        <input type="checkbox" id="menu-hamburguer">

        <label for="menu-hamburguer" class="menu-hamburguer">
            <div class="menu">
                <span class="hamburguer"></span>
            </div>
        </label>

        <div class="overlay"></div>

        <div class="links">
            <div class="usuario-infos">
                <div class="img-container">
                    <img src="../assets/images/icons/logo-FuTourSight-branco.png" alt="Imagem da empresa">
                </div>
                <span id="nomeUser"></span>
            </div>

            <nav>
                <ul>
                    <li>
                        <button onclick="redirecionarDashboard()">
                            <img src="../assets/images/icons/dashboard.png" alt="icone de dashboard">
                            <span>Dashboard</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="redirecionarEdicaoEmpresa()">
                            <img src="../assets/images/icons/empresa-branca.png" alt="icone de empresa da cor branca">
                            <span>Empresa</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="redirecionarPerfil()">
                            <img src="../assets/images/icons/perfil.png" alt="icone de perfil">
                            <span>Perfil</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="redirecionarListFuncionario()">
                            <img src="../assets/images/icons/historico.png" alt="icone de historico">
                            <span>Funcionários</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="filtro()">
                            <img src="../assets/images/icons/filtro.png" alt="icone de filtro">
                            <span>Filtro</span>
                        </button>
                    </li>
                </ul>
            </nav>

            <button class="botao-sair-container" onclick="sair()">
                <img src="../assets/images/icons/sair.png" alt="icone de sair">
                <span class="botao-sair">Sair</span>
            </button>

            <div class="logo">
                <img src="../assets/images/logo-futour-sight-branco.png" alt="Logo FuTour Sight">
                <span>FuTour Sight</span>
            </div>
        </div>
    </header>

    <main>
        <div class="topo">
            <div class="barra-pesquisa">
                <input type="text" id="input-busca" placeholder="Buscar funcionário">
                <button id="btn-busca"><img src="../assets/images/icons/pesquisar.png" alt="icone de lupa"></button>
            </div>
            <button onclick="cadastrarFuncionario()" class="botao botao-cadastrar-funcionario">Cadastrar funcionário</button>
        </div>

        <div class="tabelas-container">
            <div class="tabela container">
                <table>
                    <thead>
                        <tr>
                            <th>Colaborador</th>
                            <th>Nível de permissão</th>
                            <th>Endereço</th>
                            <th>Status</th>
                            <th>Email</th>
                            <th>Edição</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-funcionarios"></tbody>
                </table>
            </div>
        </div>

    </main>

    <div id="toast"></div>

    <script src="../assets/js/shared/redirecionamento.js"></script>
    <script src="../assets/js/shared/sessao.js"></script>
    <script src="../assets/js/pages/usuario/listaUsuarios.js"></script>
</body>

</html>
