    <header>

                <span class="hamburguer"></span>

        <div class="overlay"></div>

        <div class="links">

                    <img src="../assets/images/icons/logo-FuTourSight-branco.png" alt="Imagem da empresa">

            </div>

            <nav>
                <ul>
                    <li>
                        <button onclick="redirecionarDashboard()">
                            <img src="../assets/images/icons/dashboard.png" alt="icone de dashboard">
                            <span>Dashboard</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="redirecionarEdicaoEmpresa()">
                            <img src="../assets/images/icons/empresa-branca.png" alt="icone de empresa da cor branca">
                            <span>Empresa</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="redirecionarPerfil()">
                            <img src="../assets/images/icons/perfil.png" alt="icone de perfil">
                            <span>Perfil</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="redirecionarListFuncionario()">
                            <img src="../assets/images/icons/historico.png" alt="icone de historico">
                            <span>Funcionários</span>
                        </button>
                    </li>
                    <li>
                        <button onclick="filtro()">
                            <img src="../assets/images/icons/filtro.png" alt="icone de filtro">
                            <span>Filtro</span>
                        </button>
                    </li>
                </ul>
            </nav>

            <button class="botao-sair-container" onclick="sair()">
                <img src="../assets/images/icons/sair.png" alt="icone de sair">
                <span class="botao-sair">Sair</span>
            </button>

            <div class="logo">
                <img src="../assets/images/logo-futour-sight-branco.png" alt="Logo FuTour Sight">
                <span>FuTour Sight</span>
            </div>
        </div>
    </header>

        <!-- ------------------------- PÁGINA ------------------------- -->

        <div class="conteudo">

            <div class="titulo-pagina">
                <h1>Cadastro de Funcionário</h1>
            </div>

            <!-- Mensagem de sucesso -->
            <div id="div_msg" style="color:green; font-size:14px; margin-bottom:8px;"></div>

            <!-- Card de erro -->
            <div id="cardErro" style="display:none; margin-bottom:8px;">
                <p id="mensagem_erro" style="color:red;"></p>
            </div>

            <div class="empresa-container form-box-empresa">
                <form action="">
                    <h2>Dados do Funcionário</h2>
                    <div class="input-fb-empresa">

                        <div class="input-container">
                            <div class="label-container">
                                <label for="nome-colab">Nome do Colaborador</label>
                                <img src="../assets/images/icons/pessoa.png" alt="ícone de pessoa">
                            </div>
                            <input type="text" id="nome-colab" placeholder="Nome Completo" oninput="onkey_nome()">
                            <div id="div_msg_nome" style="color:red; font-size:12px;"></div>
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="email-colab">E-mail do Colaborador</label>
                                <img src="../assets/images/icons/email.png" alt="ícone de email">
                            </div>
                            <input type="text" id="email-colab" placeholder="E-mail" oninput="onkey_email()">
                            <div id="div_msg_email" style="color:red; font-size:12px;"></div>
                        </div>

                        <div class="input-container">
                            <div class="label-container">
                                <label for="senha-colab">Senha</label>
                                <img src="../assets/images/icons/senha.png" alt="ícone de senha">
                            </div>
                            <input type="password" id="senha-colab" placeholder="Senha" oninput="onkey_senha()">
                            <div id="div_msg_senha" style="color:red; font-size:12px;"></div>
                        </div>

                    </div>
                </form>
            </div>

            <hr>

            <div class="form-permissao">
                <div class="empresa-container form-box-empresa">
                    <form action="">
                        <h2>Dados de Configuração</h2>
                        <div class="input-fb-empresa">
                            <div class="input-container">
                                <div class="label-container">
                                    <label for="nivel">Nível de Permissão</label>
                                    <img src="../assets/images/icons/seguranca.png" alt="ícone de permissão">
                                </div>
                                <div class="label-container">
                                    <select id="nivel" required>
                                        <option value="">Selecione</option>
                                        <option value="2">EMPRESA_ADMIN</option>
                                        <option value="3">EMPRESA_USER</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="img-container">
                    <img src="../assets/images/empresa-senha.png" alt="" class="banner-img">
                </div>
            </div>

            <div class="linha-btn">
                <div class="linha-txt">
                    <img src="../assets/images/icons/info.png" alt="ícone de informação">
                    <h3>Após o cadastro do funcionário, um e-mail será enviado com as credenciais de acesso cadastradas.</h3>
                    <div class="emp-div-btn">
                        <button type="button" class="btn-main register-btn botao-cadastrar botao"
                            onclick="cadastrarFuncionario()">Cadastrar</button>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <div id="toast"></div>
