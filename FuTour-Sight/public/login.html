<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuTour Sight</title>

    <link rel="stylesheet" href="./assets/css/reset.css">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="stylesheet" href="./assets/css/login.css">
    <link rel="stylesheet" href="./assets/css/responsive.css">
</head>

<body class="body-login">
    <header>
        <a href="./index.html" class="logo">
            <img src="./assets/images/logo-futour-sight-branco.png" alt="Logo FuTour Sight">
            <span>FuTour Sight</span>
        </a>

        <input type="checkbox" id="menu-hamburguer">

        <label for="menu-hamburguer" class="menu-hamburguer">
            <div class="menu">
                <span class="hamburguer"></span>
            </div>
        </label>

        <div class="overlay"></div>

        <div class="links">
            <nav>
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./sobre.html">Sobre</a></li>
                    <li><a href="./index.html#contato">Contato</a></li>
                </ul>
            </nav>
            <div class="botoes-autenticacao">
                <a href="./login.html" class="botao-entrar">Entrar</a>
                <a href="./cadastro.html" class="botao botao-cadastrar">Cadastrar</a>
            </div>
        </div>
    </header>

    <main>
        <div class="login-container">
            <div class="campo">
                <label for="email">E-mail</label>
                <input type="text" id="email" placeholder="E-mail">
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Senha">
            </div>

            <button class="botao-esqueceu-senha">Esqueceu a senha?</button>

            <button class="botao botao-entrar">Entrar</button>

            <p>Não tem uma conta? <a href="./cadastro.html">Crie agora!</a></p>
        </div>
    </main>

    <footer class="footer secao background-gradient">
        <div class="footer-acima">
            <div class="logo">
                <a href="./index.html" class="logo">
                    <img src="./assets/images/logo-futour-sight-branco.png" alt="Logo FuTour Sight">
                    <span>FuTour Sight</span>
                </a>
            </div>
            <nav>
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./sobre.html">Sobre</a></li>
                    <li><a href="./index.html#contato">Contato</a></li>
                </ul>
            </nav>
        </div>

        <div class="footer-abaixo">
            <p>FuTour Sight@ 2026. Todos os direitos reservados</p>
            <nav>
                <ul class="redes-sociais">
                    <li><a href=""><img src="./assets/images/redes-sociais/icone-youtube.png" alt="Logo do YouTube"></a>
                    </li>
                    <li><a href=""><img src="./assets/images/redes-sociais/icone-instagram.png"
                                alt="Logo do Instagram"></a></li>
                    <li><a href=""><img src="./assets/images/redes-sociais/icone-linkedin.png"
                                alt="Logo do Linkedin"></a></li>
                </ul>
            </nav>
        </div>
    </footer>
</body>

</html>
