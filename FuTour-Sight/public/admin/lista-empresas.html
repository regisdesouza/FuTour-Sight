<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/lista-empresas.css">
</head>

<body class="background-branco">
    <header>
        <a href="../index.html" class="logo">
            <img src="../assets/images/logo-futour-sight-branco.png" alt="Logo FuTour Sight">
            <span>FuTour Sight</span>
        </a>

        <input type="checkbox" id="menu-hamburguer">

        <label for="menu-hamburguer" class="menu-hamburguer">
            <div class="menu">
                <span class="hamburguer"></span>
            </div>
        </label>

        <div class="overlay"></div>

        <div class="links">
            <nav>
                <ul>
                    <li><a href="./solicitacoes.html">Solicitações</a></li>
                    <li><a href="./lista-empresas.html">Parcerias</a></li>
                    <li><a href="./logs.html">Logs</a></li>
                </ul>
            </nav>
            <div class="botoes-autenticacao">
                <a href="../login.html" class="botao botao-cadastrar">Sair</a>
            </div>
        </div>
    </header>

    <main>
        <div class="topo">
            <div class="barra-pesquisa">
                <input type="text" placeholder="Buscar funcionário" id="input-busca">
                <button><img src="../assets/images/icons/pesquisar.png" alt="icone de lupa" id="btn-busca"></button>
            </div>
        </div>

        <div class="tabelas-container">
            <div class="tabela container">
                <table>
                    <thead>
                        <tr>
                            <th>Empresa</th>
                            <th>CNPJ</th>
                            <th>Email</th>
                            <th>Telefone</th>
                            <th>Status</th>
                            <th>Edição</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-empresas"></tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="../assets/js/pages/admin/listaEmpresas.js"></script>
</body>

</html>
