<!DOCTYPE html>
<html lang="pt-br">

<head>

    <title>Editar funcionário</title>

    <link rel="stylesheet" href="../assets/css/reset.css">

</head>

<body class="background-branco">
    <header>
        <a href="../index.html" class="logo">
