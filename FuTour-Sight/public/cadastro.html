<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuTour Sight</title>

    <link rel="stylesheet" href="./assets/css/reset.css">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="stylesheet" href="./assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="body-cadastro">
    <header>
        <a href="./index.html" class="logo">
            <img src="./assets/images/logo-futour-sight-branco.png" alt="Logo FuTour Sight">
            <span>FuTour Sight</span>
        </a>

        <input type="checkbox" id="menu-hamburguer">

        <label for="menu-hamburguer" class="menu-hamburguer">
            <div class="menu">
                <span class="hamburguer"></span>
            </div>
        </label>

        <div class="overlay"></div>

        <div class="links">
            <nav>
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./sobre.html">Sobre</a></li>
                    <li><a href="./index.html#contato">Contato</a></li>
                </ul>
            </nav>
            <div class="botoes-autenticacao">
                <a href="./login.html" class="botao-entrar">Entrar</a>
                <a href="#" class="botao-cadastrar">Cadastrar</a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="form-box pessoais">
                <form action="">
                    <h1>Cadastre-se</h1>
                    <div class="input-group">
                        <div class="input-box">
                            <label for="firstname">Primeiro nome</label>
                            <input id="firstname" type="text" placeholder="Digite seu primeiro nome" required>
                        </div>
                        <div class="input-box">
                            <label for="lastname">Sobrenome</label>
                            <input id="lastname" type="text" placeholder="Digite seu sobrenome" required>
                        </div>
                        <div class="input-box">
                            <label for="email">E-mail</label>
                            <input id="email" type="email" placeholder="Digite seu e-mail" required>
                            <i class="bi bi-envelope"></i>
                        </div>
                        <div class="input-box">
                            <label for="number">Celular</label>
                            <input id="number" type="tel" placeholder="(xx) xxxx-xxxx" required>
                            <i class="bi bi-telephone"></i>
                        </div>
                        <div class="input-box">
                            <label for="password">Senha</label>
                            <input id="password" type="password" placeholder="Digite sua senha" required>
                            <i class="bi bi-eye-slash"></i>
                        </div>
                        <div class="input-box">
                            <label for="confirm-password">Confirme sua senha</label>
                            <input id="confirm-password" type="password" placeholder="Confirme sua senha" required>
                            <i class="bi bi-eye-slash"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn-main">Cadastrar</button>
                </form>
            </div>

            <div class="form-box empresariais">
                <form action="">
                    <h1>Cadastre sua empresa</h1>
                    <div class="input-group">
                        <div class="input-box">
                            <label for="emp-name">Nome da empresa</label>
                            <input id="emp-name" type="text" placeholder="Nome da empresa" required>
                        </div>
                        <div class="input-box">
                            <label for="cnpj">CNPJ</label>
                            <input id="cnpj" type="text" placeholder="00.000.000/0000-00" required>
                        </div>
                        <div class="input-box">
                            <label for="emp-tel">Telefone</label>
                            <input id="emp-tel" type="tel" placeholder="(xx) xxxx-xxxx" required>
                            <i class="bi bi-telephone"></i>
                        </div>
                        <div class="input-box">
                            <label for="cep">CEP</label>
                            <input type="text" id="cep" placeholder="00000-000" required>
                            <i class="bi bi-map"></i>
                        </div>
                        <div class="input-box">
                            <label for="rua">Endereço</label>
                            <input id="rua" type="text" placeholder="Rua..." required>
                        </div>
                        <div class="input-box">
                            <label for="numero">Número</label>
                            <input id="numero" type="text" placeholder="Nº" required>
                        </div>
                    </div>
                    <button type="button" class="btn-main register-btn">Próximo</button>
                </form>
            </div>

            <div class="toggle-box">
                <div class="toggle-panel toggle-left">
                    <h1>Quase lá...</h1>
                    <p>Antecipe a demanda. Decida com inteligência.</p>
                    <button class="btn-outline login-btn">Voltar</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Olá, Seja bem-Vindo!</h1>
                    <p>Já tem uma conta? <a href="login.html" style="color: #fff; font-weight: bold;">Entrar</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/cadastro.js"></script>
</body>

</html>
